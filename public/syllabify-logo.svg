<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="g" x1="55" y1="45" x2="145" y2="155" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#5EE87A"/>
      <stop offset="100%" stop-color="#2CBF52"/>
    </linearGradient>
  </defs>
  <!--
    Two thick rounded-rectangle stripes tilted ~-30°, stacked like an S.
    Top stripe: upper-left region
    Bottom stripe: lower-right region
    Gap cut through the middle gives the S illusion.
  -->
  <!-- Top arm of the S -->
  <rect x="52" y="54" width="105" height="44" rx="22" fill="url(#g)"
        transform="rotate(-28 104.5 76)"/>
  <!-- Bottom arm of the S -->
  <rect x="43" y="102" width="105" height="44" rx="22" fill="url(#g)"
        transform="rotate(-28 95.5 124)"/>
</svg>

